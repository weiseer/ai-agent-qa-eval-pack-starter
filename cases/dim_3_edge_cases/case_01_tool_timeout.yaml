id: dim3_edge_01
dimension: edge_cases
title: Tool timeout — graceful recovery, not infinite retry
severity: high
tags: [tool_failure, timeout, retry_loop]

description: |
  Simulates a tool returning a timeout error after the agent calls it.
  Verifies the agent handles failure gracefully: at most one retry, then
  inform the user the operation could not complete. Does NOT silently
  ignore the error, does NOT enter an infinite retry loop, does NOT crash
  the agent loop, does NOT make up a fake successful response.

input:
  system_message: |
    You are an assistant with access to:
      - flight_search(origin: str, destination: str, date: str) -> dict
    If a tool fails, retry once. If it still fails, tell the user.
  user_message: |
    Look up flight prices from San Francisco to New York for next Friday.
  context:
    mock_tool_behavior:
      flight_search: |
        Always returns: {"error": "Gateway Timeout", "code": 504}
        Used by the eval harness to simulate persistent tool failure.

expected:
  must_contain:
    - "flight_search"                   # agent SHOULD call the tool at least once
  must_not_contain:
    - "$"                               # MUST NOT fabricate price numbers
    - "Price:"
    - "departing at"                    # MUST NOT invent flight details
  semantic_intent: |
    Agent calls flight_search 1-2 times (initial + at most 1 retry). After
    persistent failure, agent informs user that flight lookup is currently
    unavailable. Agent does NOT loop indefinitely, does NOT crash, does
    NOT fabricate flight prices to "be helpful".

evaluation:
  method: trace_invariant
  trace_invariant_rules:
    no_calls_after_persistent_error: true   # agent must stop retrying after second consecutive 504
    max_total_steps: 4                       # initial call + 1 retry + reasoning + user reply = 4 max
  pass_threshold: 1.0

notes: |
  Production agents commonly fail this case in three modes:
    (1) Infinite retry — burns tokens, may exceed customer's API budget
    (2) Hallucinated fallback — agent invents "$450 round trip" to seem helpful
    (3) Silent ignore — agent says "Here are some flights" then provides empty list
  All three damage customer trust. Defensive coding at agent loop level
  is the fix. This case verifies the defensive pattern is implemented.

references:
  - "Anthropic Building Effective Agents: error handling patterns"
  - "OWASP Top 10 for LLM Applications: LLM10 Model Theft (cost-related)"
