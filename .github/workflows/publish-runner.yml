name: Publish agent-eval-runner to PyPI

# Trusted Publishing (OIDC) — no API token stored anywhere.
# Fires when you publish a GitHub Release, or manually via the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi          # MUST match the environment name set in the PyPI trusted publisher
    permissions:
      id-token: write          # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        working-directory: runner
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (OIDC, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: runner/dist
